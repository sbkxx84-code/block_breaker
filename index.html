<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ブロック崩し</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #gameCanvas {
      background: #000;
      display: block;
      border: 4px solid #fff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    #instructions {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 14px;
      color: #fff;
    }

    #mobileControls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
    }

    .control {
      padding: 10px 20px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .control:hover {
      background: #2980b9;
    }

    .control.active {
      background: #e74c3c;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <div id="instructions">←/→ または A/D で移動、R で再挑戦</div>
  <div id="mobileControls">
    <button id="leftButton" class="control">← 左</button>
    <button id="restartButton" class="control">再挑戦</button>
    <button id="rightButton" class="control">右 →</button>
  </div>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const SCREEN_WIDTH = canvas.width;
    const SCREEN_HEIGHT = canvas.height;

    const PADDLE_WIDTH = 100;
    const PADDLE_HEIGHT = 15;
    const PADDLE_SPEED = 7;

    const BALL_RADIUS = 10;
    const BALL_SPEED = 4;

    const BRICK_ROWS = 7;
    const BRICK_COLUMNS = 12;
    const BRICK_WIDTH = 55;
    const BRICK_HEIGHT = 25;
    const BRICK_MARGIN = 10;
    const BRICK_TOP_OFFSET = 100;

    const colors = ['#e74c3c', '#3498db', '#f1c40f', '#9b59b6', '#2ecc71'];

    let paddle = {
      x: (SCREEN_WIDTH - PADDLE_WIDTH) / 2,
      y: SCREEN_HEIGHT - 100,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      dx: 0,
    };

    let ball = {
      x: SCREEN_WIDTH / 2,
      y: SCREEN_HEIGHT - 150,
      radius: BALL_RADIUS,
      dx: 3 * (Math.random() < 0.5 ? -1 : 1),
      dy: -3,
    };

    let bricks = [];
    let score = 0;
    let gameOver = false;
    let win = false;
    const keys = {};

    // アイテムシステム
    let items = [];
    const ITEM_TYPES = {
      PADDLE_EXTEND: 'paddle_extend',    // 棒が伸びる
      DUAL_BALL: 'dual_ball',            // 球が2つ増える
      SLOW_BALL: 'slow_ball'             // ボールがゆっくり
    };
    const ITEM_SIZE = 20;
    const ITEM_FALL_SPEED = 2;
    const ITEM_DURATION = 300; // フレーム数

    let activePowers = {
      extendedPaddle: false,
      extendEndTime: 0,
      slowBall: false,
      slowEndTime: 0
    };

    // グローバル初期化
    window.extraBalls = [];
    window.ballSpeedMultiplier = 1;

    function setTouchControl(direction, active) {
      if (direction === 'left') {
        keys['ArrowLeft'] = active;
      }
      if (direction === 'right') {
        keys['ArrowRight'] = active;
      }
    }

    function spawnItem(x, y) {
      const itemTypes = Object.values(ITEM_TYPES);
      const randomType = itemTypes[Math.floor(Math.random() * itemTypes.length)];
      items.push({
        x: x,
        y: y,
        type: randomType,
        width: ITEM_SIZE,
        height: ITEM_SIZE,
        dy: ITEM_FALL_SPEED
      });
    }

    function activatePowerUp(itemType) {
      if (itemType === ITEM_TYPES.PADDLE_EXTEND) {
        // 棒を伸ばす
        if (!activePowers.extendedPaddle) {
          paddle.width = PADDLE_WIDTH * 2;
          activePowers.extendedPaddle = true;
          activePowers.extendEndTime = Date.now() / 16.67 + ITEM_DURATION;
        } else {
          // 既に効果がある場合は時間を追加
          activePowers.extendEndTime += ITEM_DURATION;
        }
      } else if (itemType === ITEM_TYPES.DUAL_BALL) {
        // ボールを2つ増やす（最大2個の追加ボール）
        if (!window.extraBalls) window.extraBalls = [];
        // 既存の追加ボール数に応じて、2個を超えないようにする
        const allowedNewBalls = Math.max(0, 2 - window.extraBalls.length);
        for (let i = 0; i < allowedNewBalls; i++) {
          const newBall = {
            x: paddle.x + paddle.width / 2 + (Math.random() - 0.5) * 100,
            y: paddle.y - 50,
            radius: BALL_RADIUS,
            dx: BALL_SPEED * (Math.random() < 0.5 ? -1 : 1) * (0.8 + Math.random() * 0.4),
            dy: BALL_SPEED * (0.8 + Math.random() * 0.4)
          };
          window.extraBalls.push(newBall);
        }
      } else if (itemType === ITEM_TYPES.SLOW_BALL) {
        // ボールをゆっくりにする
        if (!activePowers.slowBall) {
          window.ballSpeedMultiplier = 0.5;
          activePowers.slowBall = true;
          activePowers.slowEndTime = Date.now() / 16.67 + ITEM_DURATION;
        }
      }
    }

    function createBricks() {
      bricks = [];
      for (let row = 0; row < BRICK_ROWS; row++) {
        for (let col = 0; col < BRICK_COLUMNS; col++) {
          const x = BRICK_MARGIN + col * (BRICK_WIDTH + BRICK_MARGIN);
          const y = BRICK_TOP_OFFSET + row * (BRICK_HEIGHT + BRICK_MARGIN);
          bricks.push({ x, y, width: BRICK_WIDTH, height: BRICK_HEIGHT, color: colors[row % colors.length] });
        }
      }
    }

    function resetGame() {
      paddle.x = (SCREEN_WIDTH - PADDLE_WIDTH) / 2;
      paddle.width = PADDLE_WIDTH;
      ball.x = SCREEN_WIDTH / 2;
      ball.y = SCREEN_HEIGHT - 150;
      ball.dx = 3 * (Math.random() < 0.5 ? -1 : 1);
      ball.dy = -3;
      score = 0;
      gameOver = false;
      win = false;
      items = [];
      window.extraBalls = [];
      window.ballSpeedMultiplier = 1;
      activePowers = {
        extendedPaddle: false,
        extendEndTime: 0,
        slowBall: false,
        slowEndTime: 0
      };
      createBricks();
    }

    function drawText(text, x, y, size = '24px', color = '#fff') {
      ctx.fillStyle = color;
      ctx.font = `${size} Arial, sans-serif`;
      ctx.textBaseline = 'top';
      ctx.fillText(text, x, y);
    }

    function drawTextWithBG(text, x, y, size = '24px', color = '#fff', bgColor = 'rgba(0, 0, 0, 0.5)') {
      ctx.font = `${size} Arial, sans-serif`;
      ctx.textBaseline = 'top';
      const metrics = ctx.measureText(text);
      const width = metrics.width;
      const height = parseInt(size);
      
      // 背景を描画
      ctx.fillStyle = bgColor;
      ctx.fillRect(x - 5, y - 5, width + 10, height + 10);
      
      // テキストを描画
      ctx.fillStyle = color;
      ctx.fillText(text, x, y);
    }

    function draw() {
      ctx.clearRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
      
      // パドルを描画（黄色・はっきり見える）
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
      
      // パドルの枠線も描画
      ctx.strokeStyle = '#ff0000';
      ctx.lineWidth = 3;
      ctx.strokeRect(paddle.x, paddle.y, paddle.width, paddle.height);
      
      // ボールを描画
      ctx.fillStyle = '#f39c12';
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fill();

      // 追加のボールを描画
      if (window.extraBalls) {
        window.extraBalls.forEach((extraBall) => {
          ctx.fillStyle = '#ff6600';
          ctx.beginPath();
          ctx.arc(extraBall.x, extraBall.y, extraBall.radius, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      bricks.forEach((brick) => {
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
        ctx.strokeStyle = '#000';
        ctx.strokeRect(brick.x, brick.y, brick.width, brick.height);
      });

      // アイテムを描画
      items.forEach((item) => {
        let itemColor = '#ffffff';
        let itemSymbol = '';
        
        if (item.type === ITEM_TYPES.PADDLE_EXTEND) {
          itemColor = '#0088ff';
          itemSymbol = 'P';
        } else if (item.type === ITEM_TYPES.DUAL_BALL) {
          itemColor = '#ff8800';
          itemSymbol = 'B';
        } else if (item.type === ITEM_TYPES.SLOW_BALL) {
          itemColor = '#00ff00';
          itemSymbol = 'S';
        }
        
        ctx.fillStyle = itemColor;
        ctx.fillRect(item.x - item.width / 2, item.y - item.height / 2, item.width, item.height);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(item.x - item.width / 2, item.y - item.height / 2, item.width, item.height);
        
        // シンボルを描画
        ctx.fillStyle = '#000';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(itemSymbol, item.x, item.y);
      });

      drawTextWithBG(`スコア: ${score}`, 20, 20, '28px', '#ffff00', 'rgba(0, 0, 0, 0.7)');

      if (gameOver) {
        drawText('ゲームオーバー', SCREEN_WIDTH / 2 - 160, SCREEN_HEIGHT / 2, '48px', '#e74c3c');
        drawText('Rキーで再挑戦', SCREEN_WIDTH / 2 - 130, SCREEN_HEIGHT / 2 + 50, '24px');
      }

      if (win) {
        drawText('完全クリア！', SCREEN_WIDTH / 2 - 140, SCREEN_HEIGHT / 2, '48px', '#2ecc71');
        drawText('Rキーで再挑戦', SCREEN_WIDTH / 2 - 130, SCREEN_HEIGHT / 2 + 50, '24px');
      }
    }

    function update() {
      if (gameOver || win) return;

      if (keys['ArrowLeft'] || keys['a']) {
        paddle.x -= PADDLE_SPEED;
      }
      if (keys['ArrowRight'] || keys['d']) {
        paddle.x += PADDLE_SPEED;
      }

      paddle.x = Math.max(0, Math.min(SCREEN_WIDTH - paddle.width, paddle.x));

      if (!window.ballSpeedMultiplier) window.ballSpeedMultiplier = 1;

      ball.x += ball.dx * window.ballSpeedMultiplier;
      ball.y += ball.dy * window.ballSpeedMultiplier;

      if (ball.x - ball.radius <= 0 || ball.x + ball.radius >= SCREEN_WIDTH) {
        ball.dx = -ball.dx;
      }
      if (ball.y - ball.radius <= 0) {
        ball.dy = -ball.dy;
      }

      if (
        ball.x > paddle.x &&
        ball.x < paddle.x + paddle.width &&
        ball.y + ball.radius > paddle.y &&
        ball.y - ball.radius < paddle.y + paddle.height &&
        ball.dy > 0
      ) {
        ball.dy = -BALL_SPEED;
        const diff = ball.x - (paddle.x + paddle.width / 2);
        ball.dx = BALL_SPEED * (diff / (paddle.width / 2));
      }

      // ブロック破壊対象を記録するセット
      const destroyedBrickIndices = new Set();

      // メインボールのブロック衝突判定
      for (let index = 0; index < bricks.length; index++) {
        const brick = bricks[index];
        if (
          ball.x + ball.radius > brick.x &&
          ball.x - ball.radius < brick.x + brick.width &&
          ball.y + ball.radius > brick.y &&
          ball.y - ball.radius < brick.y + brick.height
        ) {
          score += 100;
          const brickCenterX = brick.x + brick.width / 2;
          const brickCenterY = brick.y + brick.height / 2;
          
          // ランダムでアイテムをスポーン（10%の確率）
          if (Math.random() < 0.1) {
            spawnItem(brickCenterX, brickCenterY);
          }
          
          destroyedBrickIndices.add(index);
          
          // 衝突方向を判定して跳ね返す
          const overlapLeft = ball.x + ball.radius - brick.x;
          const overlapRight = brick.x + brick.width - (ball.x - ball.radius);
          const overlapTop = ball.y + ball.radius - brick.y;
          const overlapBottom = brick.y + brick.height - (ball.y - ball.radius);
          
          const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
          
          if (minOverlap === overlapTop || minOverlap === overlapBottom) {
            ball.dy = -ball.dy;
            // ボールをブロック外側に押し出す
            if (minOverlap === overlapTop) {
              ball.y = brick.y - ball.radius;
            } else {
              ball.y = brick.y + brick.height + ball.radius;
            }
          } else {
            ball.dx = -ball.dx;
            // ボールをブロック外側に押し出す
            if (minOverlap === overlapLeft) {
              ball.x = brick.x - ball.radius;
            } else {
              ball.x = brick.x + brick.width + ball.radius;
            }
          }
          break; // 1フレームで1ブロックのみ破壊
        }
      }

      // extraBallsのブロック衝突判定
      if (window.extraBalls) {
        window.extraBalls.forEach((eBall) => {
          for (let index = 0; index < bricks.length; index++) {
            const brick = bricks[index];
            if (
              eBall.x + eBall.radius > brick.x &&
              eBall.x - eBall.radius < brick.x + brick.width &&
              eBall.y + eBall.radius > brick.y &&
              eBall.y - eBall.radius < brick.y + brick.height
            ) {
              score += 100;
              const brickCenterX = brick.x + brick.width / 2;
              const brickCenterY = brick.y + brick.height / 2;
              
              // ランダムでアイテムをスポーン（10%の確率）
              if (Math.random() < 0.1) {
                spawnItem(brickCenterX, brickCenterY);
              }
              
              destroyedBrickIndices.add(index);
              
              // 衝突方向を判定して跳ね返す
              const overlapLeft = eBall.x + eBall.radius - brick.x;
              const overlapRight = brick.x + brick.width - (eBall.x - eBall.radius);
              const overlapTop = eBall.y + eBall.radius - brick.y;
              const overlapBottom = brick.y + brick.height - (eBall.y - eBall.radius);
              
              const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
              
              if (minOverlap === overlapTop || minOverlap === overlapBottom) {
                eBall.dy = -eBall.dy;
                // ボールをブロック外側に押し出す
                if (minOverlap === overlapTop) {
                  eBall.y = brick.y - eBall.radius;
                } else {
                  eBall.y = brick.y + brick.height + eBall.radius;
                }
              } else {
                eBall.dx = -eBall.dx;
                // ボールをブロック外側に押し出す
                if (minOverlap === overlapLeft) {
                  eBall.x = brick.x - eBall.radius;
                } else {
                  eBall.x = brick.x + brick.width + eBall.radius;
                }
              }
              break; // 1フレームで1ブロックのみ破壊
            }
          }
        });
      }

      // 破壊対象ブロックを逆順で削除（インデックスズレ対策）
      Array.from(destroyedBrickIndices)
        .sort((a, b) => b - a)
        .forEach(index => {
          bricks.splice(index, 1);
        });

      if (ball.y - ball.radius > SCREEN_HEIGHT) {
        // extraBallsが存在する場合、メインボールをリセットして続行
        if (window.extraBalls && window.extraBalls.length > 0) {
          ball.x = SCREEN_WIDTH / 2;
          ball.y = SCREEN_HEIGHT - 150;
          ball.dx = 3 * (Math.random() < 0.5 ? -1 : 1);
          ball.dy = -3;
        } else {
          gameOver = true;
        }
      }
      if (bricks.length === 0) {
        win = true;
      }

      // アイテムの更新
      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += item.dy;

        // パドルとの衝突判定
        if (
          item.x > paddle.x &&
          item.x < paddle.x + paddle.width &&
          item.y > paddle.y &&
          item.y < paddle.y + paddle.height
        ) {
          // アイテム効果を実行
          activatePowerUp(item.type);
          items.splice(i, 1);
          continue;
        }

        // 画面外に落ちたアイテムを削除
        if (item.y > SCREEN_HEIGHT) {
          items.splice(i, 1);
        }
      }

      // パワーアップの効果時間をチェック
      if (activePowers.extendedPaddle && Date.now() > activePowers.extendEndTime * 16.67) {
        activePowers.extendedPaddle = false;
        paddle.width = PADDLE_WIDTH;
      }
      if (activePowers.slowBall && Date.now() > activePowers.slowEndTime * 16.67) {
        activePowers.slowBall = false;
        window.ballSpeedMultiplier = 1;
      }

      // 追加のボールを更新
      if (window.extraBalls) {
        for (let i = window.extraBalls.length - 1; i >= 0; i--) {
          const eBall = window.extraBalls[i];
          eBall.x += eBall.dx * window.ballSpeedMultiplier;
          eBall.y += eBall.dy * window.ballSpeedMultiplier;

          // 壁との衝突
          if (eBall.x - eBall.radius <= 0 || eBall.x + eBall.radius >= SCREEN_WIDTH) {
            eBall.dx = -eBall.dx;
          }
          if (eBall.y - eBall.radius <= 0) {
            eBall.dy = -eBall.dy;
          }

          // パドルとの衝突
          if (
            eBall.x > paddle.x &&
            eBall.x < paddle.x + paddle.width &&
            eBall.y + eBall.radius > paddle.y &&
            eBall.y - eBall.radius < paddle.y + paddle.height &&
            eBall.dy > 0
          ) {
            eBall.dy = -BALL_SPEED;
            const diff = eBall.x - (paddle.x + paddle.width / 2);
            eBall.dx = BALL_SPEED * (diff / (paddle.width / 2));
          }

          // 画面下部に落ちたボールを削除
          if (eBall.y - eBall.radius > SCREEN_HEIGHT) {
            window.extraBalls.splice(i, 1);
          }
        }
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (event) => {
      keys[event.key] = true;
      if (event.key === 'r' || event.key === 'R') {
        resetGame();
      }
    });

    window.addEventListener('keyup', (event) => {
      keys[event.key] = false;
    });

    const leftButton = document.getElementById('leftButton');
    const rightButton = document.getElementById('rightButton');
    const restartButton = document.getElementById('restartButton');

    function clearTouchControls() {
      setTouchControl('left', false);
      setTouchControl('right', false);
      leftButton.classList.remove('active');
      rightButton.classList.remove('active');
    }

    leftButton.addEventListener('pointerdown', () => {
      setTouchControl('left', true);
      leftButton.classList.add('active');
    });
    leftButton.addEventListener('pointerup', clearTouchControls);
    leftButton.addEventListener('pointerleave', clearTouchControls);
    leftButton.addEventListener('pointercancel', clearTouchControls);

    rightButton.addEventListener('pointerdown', () => {
      setTouchControl('right', true);
      rightButton.classList.add('active');
    });
    rightButton.addEventListener('pointerup', clearTouchControls);
    rightButton.addEventListener('pointerleave', clearTouchControls);
    rightButton.addEventListener('pointercancel', clearTouchControls);

    restartButton.addEventListener('click', resetGame);

    canvas.addEventListener('pointerdown', (event) => {
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      if (x < rect.width / 2) {
        setTouchControl('left', true);
        leftButton.classList.add('active');
      } else {
        setTouchControl('right', true);
        rightButton.classList.add('active');
      }
    });
    canvas.addEventListener('pointerup', clearTouchControls);
    canvas.addEventListener('pointercancel', clearTouchControls);

    resetGame();
    loop();
  </script>
</body>
</html>
